name: MobileSudoku

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  MobileSudoku:
    type: application
    platform: iOS
    sources:
      - MobileSudoku
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MobileSudoku
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
